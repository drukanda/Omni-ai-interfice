<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drukanda Omni-AI | Public Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle, #020617 0%, #000000 100%); color: #00f3ff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(0, 243, 255, 0.1); }
        .output-box::-webkit-scrollbar { width: 4px; }
        .output-box::-webkit-scrollbar-thumb { background: #00f3ff; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-5xl glass p-8 rounded-3xl shadow-2xl relative overflow-hidden">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black italic uppercase">Drukanda <span class="text-white">Omni-AI</span></h1>
            <p class="text-[10px] text-cyan-500 mt-1 tracking-[0.3em] uppercase">Status: Connection Verified</p>
        </header>

        <div id="display" class="output-box h-[400px] overflow-y-auto mb-6 p-4 text-sm border-b border-cyan-900/30">
            <div class="text-cyan-700 italic">[SYSTEM]: Jalur v1beta Aktif. Menunggu perintah...</div>
        </div>

        <div class="space-y-4">
            <textarea id="prompt" placeholder="Ketik pesan di sini..." 
                      class="w-full bg-black/50 border border-cyan-800 p-4 rounded-xl text-white focus:outline-none focus:border-cyan-400 h-24 resize-none"></textarea>
            
            <button onclick="runAI()" class="w-full p-4 bg-cyan-900/20 border border-cyan-500 rounded-lg hover:bg-cyan-500 hover:text-black transition font-bold uppercase text-xs tracking-widest">
                💡 Jalankan Tanya Publik
            </button>
        </div>
    </div>

    <script>
        // API KEY BARU SUDAH TERPASANG
        const API_KEY = "AIzaSyA28Oxr6apgNTzdVkJ34xvEmrsPv5fNGhw";

        async function runAI() {
            const promptInput = document.getElementById('prompt');
            const display = document.getElementById('display');
            const text = promptInput.value;

            if (!text) return;

            // Tampilkan Chat User
            display.innerHTML += `<div class="text-white bg-white/5 p-3 rounded-lg ml-10 mb-4"><strong>USER:</strong> ${text}</div>`;
            
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = "text-cyan-400 p-3 rounded-lg mr-10 mb-4 bg-cyan-900/10 border-l-2 border-cyan-400";
            aiMsgDiv.innerHTML = `<strong>AI:</strong> <span class="animate-pulse">Menghubungkan ke Quantum Core...</span>`;
            display.appendChild(aiMsgDiv);

            promptInput.value = "";
            display.scrollTop = display.scrollHeight;

            try {
                // Menggunakan model Flash dengan jalur v1beta yang paling kompatibel
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiResponse = data.candidates[0].content.parts[0].text;
                aiMsgDiv.innerHTML = `<strong>AI (VERIFIED):</strong> ${aiResponse}`;

            } catch (error) {
                aiMsgDiv.innerHTML = `<span class="text-red-500 italic text-xs">LOG ERROR: ${error.message}</span>`;
            }
            display.scrollTop = display.scrollHeight;
        }
    </script>
</body>
</html>
