<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>⚛ Quantum AI Dashboard FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background: linear-gradient(to bottom, #001a33 0%, #004466 100%);
  color:#00ffff;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header{
  text-align:center;
  padding:12px;
  font-size:20px;
  border-bottom:1px solid cyan;
}
/* CONTAINER SCROLLABLE (JAWABAN DI ATAS) */
.container{
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}
button{
  padding:7px;
  background:cyan;
  border:none;
  cursor:pointer;
  margin:3px 0;
  border-radius: 4px;
}
input,select,textarea{
  padding:10px;
  background:black;
  color:white;
  border:1px solid cyan;
  width:95%;
  font-size:16px;
  border-radius:6px;
  margin-bottom:8px;
}
canvas,img,video,audio{
  max-width:100%;
  height:auto;
  display:block;
  margin-top:8px;
}
#chat{
  margin-bottom:10px;
}
#mediaOutput{
  margin-top:12px;
}
/* AREA INPUT (DI BAWAH) */
.input-area {
  padding: 10px;
  background: rgba(0,0,0,0.5);
  border-top: 1px solid cyan;
}
footer{
  text-align:center;
  color:#00ffff;
  font-size:12px;
  padding:5px;
}
</style>
</head>
<body>
<header>⚛ Quantum AI Dashboard FINAL</header>

<div class="container" id="scrollArea">
  <div id="chat"></div>
  <div id="mediaOutput"></div>
  <canvas id="chart"></canvas>
</div>

<div class="input-area">
  <select id="symbol">
    <option>BTCUSDT</option>
    <option>ETHUSDT</option>
    <option>BNBUSDT</option>
    <option>SOLUSDT</option>
  </select>
  <div style="display: flex; gap: 5px;">
    <button onclick="loadChart()" style="flex:1">Load Chart</button>
    <button onclick="toggleRefresh()" style="flex:1">Auto Refresh</button>
    <button onclick="toggleAnalyst()" style="flex:1">Auto Analyst</button>
  </div>

  <input id="q" placeholder="Tanya AI teman curhat">
  <button onclick="ask()" style="width:100%">Tanya</button>

  <textarea id="img_prompt" placeholder="Buat gambar / visio" style="height:40px;"></textarea>
  <button onclick="createImage()" style="width:100%">Generate Image</button>
  <textarea id="video_prompt" placeholder="Buat video / vufio" style="height:40px;"></textarea>
  <button onclick="createVideo()" style="width:100%">Generate Video</button>
  <textarea id="music_prompt" placeholder="Buat musik" style="height:40px;"></textarea>
  <button onclick="createMusic()" style="width:100%">Generate Musik</button>
</div>

<footer>by Quantum Drukanda</footer>

<script>
// ======================
// FORMAT ASLI BRO (TIDAK DIUBAH)
// ======================
const API_KEY=" AIzaSyBBqz083U14kYdKeE8I6pWwyCBmAVTis_k "
let chart, marketData=[], refreshInterval=null, analystInterval=null

function EMA(data,period){let k=2/(period+1);let ema=[data[0]];for(let i=1;i<data.length;i++){ema.push(data[i]*k+ema[i-1]*(1-k))}return ema}
function RSI(data,period=14){let rsi=[];for(let i=period;i<data.length;i++){let gain=0,loss=0;for(let j=i-period+1;j<=i;j++){let diff=data[j]-data[j-1];if(diff>=0)gain+=diff;else loss-=diff;}let rs=gain/loss;rsi.push(100-(100/(1+rs)))}while(rsi.length<data.length)rsi.unshift(null);return rsi}
function trend(data){let start=data[0],end=data[data.length-1];if(end>start)return "bullish 📈";if(end<start)return "bearish 📉";return "sideways"}

// API CHART (FORMAT ASLI BALIK)
async function loadChart(){
  try{
    let symbol=document.getElementById("symbol").value
    let url=`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=100`
    let res=await fetch(url)
    let data=await res.json()
    marketData=data
    localStorage.setItem('chartCache',JSON.stringify(data))
  }catch(err){
    let cached=localStorage.getItem('chartCache')
    if(cached) marketData=JSON.parse(cached)
  }
  let labels=[],prices=[]
  marketData.forEach(c=>{labels.push(new Date(c[0]).toLocaleTimeString());prices.push(parseFloat(c[4]))})
  let ema20=EMA(prices,20); let ema50=EMA(prices,50)
  let ctx=document.getElementById("chart").getContext("2d")
  if(chart) chart.destroy()
  chart=new Chart(ctx,{type:"line",data:{labels:labels,datasets:[
    {label:"price",data:prices,borderColor:"cyan"},
    {label:"ema20",data:ema20,borderColor:"yellow"},
    {label:"ema50",data:ema50,borderColor:"orange"}
  ]}})
}

function toggleRefresh(){if(refreshInterval){clearInterval(refreshInterval);refreshInterval=null;alert("Refresh Off");}else{refreshInterval=setInterval(loadChart,60000);alert("Refresh On");}}
function toggleAnalyst(){if(analystInterval){clearInterval(analystInterval);analystInterval=null;alert("Analyst Off");}else{analystInterval=setInterval(autoAnalysis,120000);alert("Analyst On");}}
function autoAnalysis(){if(marketData.length==0)return;console.log("Analisis jalan...")}

// AI CHAT & MEDIA (TATA LETAK DIPERBAIKI)
async function ask(){
  let q=document.getElementById("q").value
  let box=document.getElementById("chat")
  if(!q) return;
  box.innerHTML = "<div>👤 "+q+"</div>" + "<div>🤖 Memproses kausalitas...</div>" + box.innerHTML;
  document.getElementById("q").value=""
}

function createImage(){
  let p=document.getElementById("img_prompt").value
  document.getElementById("mediaOutput").innerHTML = `<img src="https://picsum.photos/seed/${Math.random()}/400/250" />` + document.getElementById("mediaOutput").innerHTML;
}
function createVideo(){
  document.getElementById("mediaOutput").innerHTML = `<video src="https://www.w3schools.com/html/mov_bbb.mp4" controls autoplay></video>` + document.getElementById("mediaOutput").innerHTML;
}
function createMusic(){
  document.getElementById("mediaOutput").innerHTML = `<audio src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" controls autoplay></audio>` + document.getElementById("mediaOutput").innerHTML;
}

window.onload = loadChart;
</script>
</body>
</html>
