<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LINK V8.0</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: monospace; padding: 20px; margin: 0; }
        #chat { height: 75vh; overflow-y: auto; padding: 10px; border-bottom: 1px solid #333; }
        .u { color: #fff; margin-top: 10px; font-weight: bold; }
        .a { color: #00f2ff; margin-bottom: 10px; border-left: 2px solid #00f2ff; padding-left: 10px; }
        input { width: 100%; background: #000; border: none; border-top: 1px solid #333; color: #00f2ff; padding: 20px; outline: none; position: fixed; bottom: 0; left: 0; }
    </style>
</head>
<body>
    <div style="font-size: 10px; opacity: 0.5;">SYSTEM ONLINE v8.0</div>
    <div id="chat"></div>
    <input type="text" id="i" placeholder="> Ketik perintah..." onkeypress="sh(event)">
    <script>
        async function sh(e) {
            if (e.key === 'Enter' && e.target.value) {
                const p = e.target.value;
                const c = document.getElementById('chat');
                c.innerHTML += `<div class="u">> ${p}</div>`;
                e.target.value = '';
                try {
                    const res = await fetch('/api', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ pesan: p })
                    });
                    const d = await res.json();
                    c.innerHTML += `<div class="a">| ${d.jawaban || "Sistem No Response"}</div>`;
                } catch (err) {
                    c.innerHTML += `<div class="a">| ERROR: KONEKSI PUTUS</div>`;
                }
                c.scrollTop = c.scrollHeight;
            }
        }
    </script>
</body>
</html>
