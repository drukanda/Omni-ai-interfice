<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>quantum ai dashboard FUTURISTIK FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(to bottom, #001f3f, #004080, #001f3f);
  color:#0ff;
}
header{
  text-align:center;
  padding:8px;
  font-size:18px;
  border-bottom:1px solid cyan;
}
.container{
  padding:6px;
  max-width:100%;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:5px;
}
canvas{
  width:100%;
  height:180px;
  margin-top:5px;
}
#chatContainer{
  background:rgba(0,0,50,0.6);
  border:1px solid cyan;
  border-radius:6px;
  padding:5px;
  max-height:200px;
  overflow:auto;
}
#mediaOutput{
  margin-top:5px;
}
textarea,input,button,select{
  padding:5px;
  border:1px solid cyan;
  background:black;
  color:#0ff;
  width:100%;
  box-sizing:border-box;
  border-radius:4px;
}
button{
  cursor:pointer;
}
footer{
  text-align:center;
  font-size:11px;
  color:#0ff;
  padding:5px;
}
</style>
</head>
<body>
<header>⚛ quantum ai dashboard FUTURISTIK FINAL</header>
<div class="container">

<!-- Chart -->
<select id="symbol">
<option>BTCUSDT</option>
<option>ETHUSDT</option>
<option>BNBUSDT</option>
<option>SOLUSDT</option>
</select>
<canvas id="chart"></canvas>

<!-- Kotak Jawaban AI + Media -->
<div id="chatContainer"></div>
<div id="mediaOutput"></div>

<!-- Kotak Input -->
<textarea id="q" placeholder="Tanya AI / Enter → submit" onkeydown="if(event.key==='Enter'){event.preventDefault();ask();}"></textarea>
<button onclick="ask()">↟ Kirim</button>

</div>
<footer>by quantum drukanda</footer>

<script>
// ======================
// API KEY ONLINE
// ======================
const API_KEY = " AIzaSyBBqz083U14kYdKeE8I6pWwyCBmAVTis_k "

// ======================
// Cache & Data
// ======================
let chart, marketData=[], chatCache=[], mediaCache={}
const chatContainer=document.getElementById("chatContainer")
const mediaOutput=document.getElementById("mediaOutput")

// ======================
// Chart Auto-Load
// ======================
async function loadChart(){
  try{
    let symbol=document.getElementById("symbol").value
    let url=`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=50`
    let res=await fetch(url,{headers:{'X-API-KEY':API_KEY}})
    let data=await res.json()
    marketData=data
    localStorage.setItem('chartCache',JSON.stringify(data))
  }catch(err){
    console.log("offline mode")
    let cached=localStorage.getItem('chartCache')
    marketData=cached?JSON.parse(cached):[{"time":"12:00","price":10000}]
  }
  let labels=[],prices=[]
  marketData.forEach(c=>{labels.push(new Date(c[0]).toLocaleTimeString());prices.push(parseFloat(c[4]||c.price))})
  let ctx=document.getElementById("chart").getContext("2d")
  if(chart) chart.destroy()
  chart=new Chart(ctx,{type:"line",data:{labels:labels,datasets:[{label:"price",data:prices,borderColor:"cyan"}]}})
}
loadChart()

// ======================
// AI Chat Offline + Online Mini
// ======================
function ask(){
  let q=document.getElementById("q").value
  if(!q.trim()) return;
  chatContainer.innerHTML+="<div>👤 "+q+"</div>"
  let reply="🤖 AI setia mendengar..."
  // keyword-based offline cerdas
  if(q.toLowerCase().includes("halo")) reply="🤖 Halo bro! Kabar baik kan?"
  else if(q.toLowerCase().includes("sedih")) reply="🤖 Tetap semangat bro, semua ada jalan keluar 🌟"
  else if(q.toLowerCase().includes("gimana")) reply="🤖 Tenang bro, semua bisa diatasi 😉"
  else if(q.toLowerCase().includes("gambar")) reply="🤖 Siap! Generate gambar sesuai permintaanmu."
  else if(q.toLowerCase().includes("musik")) reply="🤖 Siap! Generate musik sesuai permintaanmu."
  else if(chatCache.length>0) reply="🤖 "+chatCache[chatCache.length-1]
  chatCache.push(reply)
  localStorage.setItem('chatCache',JSON.stringify(chatCache))

  // Kotak jawaban timbul / transparan opal
  let div=document.createElement("div")
  div.style.background="rgba(0,0,80,0.6)"
  div.style.border="1px solid cyan"
  div.style.borderRadius="6px"
  div.style.padding="5px"
  div.style.marginBottom="5px"
  div.innerHTML=reply
  chatContainer.appendChild(div)
  chatContainer.scrollTop=chatContainer.scrollHeight
  document.getElementById("q").value=""

  // Auto generate media jika keyword ada
  if(q.toLowerCase().includes("gambar")) createImage(q)
  if(q.toLowerCase().includes("musik")) createMusic(q)
}

// ======================
// Media Mini Offline
// ======================
function createImage(prompt){
  mediaOutput.innerHTML=""
  let img=new Image()
  img.src="https://via.placeholder.com/300x150?text="+encodeURIComponent(prompt||"Gambar AI")
  mediaOutput.appendChild(img)
  mediaCache['img']=img.src
  localStorage.setItem('mediaCache',JSON.stringify(mediaCache))
}

function createMusic(prompt){
  mediaOutput.innerHTML=""
  let a=document.createElement("audio")
  a.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
  a.controls=true
  mediaOutput.appendChild(a)
  mediaCache['audio']=a.src
  localStorage.setItem('mediaCache',JSON.stringify(mediaCache))
}
</script>
</body>
</html>
