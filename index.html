<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-AI SLIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00f3ff; font-family: 'Courier New', monospace; }
        .terminal { border: 1px solid #164e63; background: rgba(0,0,0,0.8); }
        .btn { border: 1px solid #22d3ee; transition: 0.3s; font-size: 10px; }
        .btn:active { background: #22d3ee; color: #000; }
        ::-webkit-scrollbar { width: 2px; }
    </style>
</head>
<body class="p-3 h-screen flex flex-col">

    <div class="flex justify-between items-center mb-3 border-b border-cyan-900 pb-1">
        <h1 class="text-xs font-bold tracking-widest italic text-white">DRUKANDA <span class="text-cyan-400">OMNI-AI</span></h1>
        <div class="flex gap-1">
            <div class="w-1 h-3 bg-cyan-500 animate-bounce"></div>
            <div class="w-1 h-3 bg-cyan-500 animate-bounce [animation-delay:0.2s]"></div>
        </div>
    </div>

    <div id="display" class="flex-1 terminal rounded-lg p-3 overflow-y-auto text-[11px] mb-3 space-y-3 shadow-[0_0_15px_rgba(0,0,0,0.5)]">
        <div class="text-cyan-800 opacity-70 border-b border-cyan-950 pb-1">[LOG]: System Stabilized. Ready for Drukanda.</div>
    </div>

    <div class="space-y-2">
        <textarea id="prompt" placeholder="Ketik perintah..." 
                  class="w-full bg-black border border-cyan-900 p-2 rounded-md text-white text-xs h-16 focus:border-cyan-400 outline-none"></textarea>
        
        <div class="grid grid-cols-3 gap-2">
            <button onclick="runAI('tanya')" class="btn p-2 rounded-md font-bold uppercase tracking-tighter">💡 Tanya</button>
            <button class="btn p-2 rounded-md font-bold uppercase opacity-30 text-purple-400">🎨 Image</button>
            <button class="btn p-2 rounded-md font-bold uppercase opacity-30 text-blue-400">🎬 Video</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyA28Oxr6apgNTzdVkJ34xvEmrsPv5fNGhw";

        async function runAI(mode) {
            const promptInput = document.getElementById('prompt');
            const display = document.getElementById('display');
            const text = promptInput.value;
            if (!text) return;

            display.innerHTML += `<div class="text-gray-400 italic">> ${text}</div>`;
            const aiMsg = document.createElement('div');
            aiMsg.className = "text-cyan-300 pl-2 border-l-2 border-cyan-600 my-2";
            aiMsg.innerHTML = "Processing...";
            display.appendChild(aiMsg);
            promptInput.value = "";
            display.scrollTop = display.scrollHeight;

            try {
                // INI JALUR PALING PASTI UNTUK GEMINI 1.5 FLASH DI TAHUN 2026
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    // Jika masih "Not Found", kita paksa pakai model 'gemini-pro' sebagai cadangan otomatis
                    if (data.error.message.includes("not found")) {
                         return runBackup(text, aiMsg);
                    }
                    throw new Error(data.error.message);
                }

                aiMsg.innerHTML = `<strong>AI:</strong> ${data.candidates[0].content.parts[0].text}`;
            } catch (e) {
                aiMsg.innerHTML = `<span class="text-red-500 text-[10px]">CRITICAL ERROR: ${e.message}</span>`;
            }
            display.scrollTop = display.scrollHeight;
        }

        async function runBackup(text, element) {
            element.innerHTML = "Switching to Backup Engine...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const d = await res.json();
                element.innerHTML = `<strong>AI (Bkp):</strong> ${d.candidates[0].content.parts[0].text}`;
            } catch (err) {
                element.innerHTML = `<span class="text-red-500 text-[10px]">ALL ENGINES FAILED. Check API Key Permissions.</span>`;
            }
        }
    </script>
</body>
</html>
