<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>quantum ai dashboard SUPER FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#000;color:#0ff;font-family:Arial;margin:0;}
header{text-align:center;padding:8px;font-size:18px;border-bottom:1px solid cyan;}
.container{padding:6px;max-width:100%;margin:auto;display:flex;flex-direction:column;gap:5px;}
input,select,textarea,button{padding:5px;border:1px solid cyan;background:black;color:#0ff;width:100%;box-sizing:border-box;}
canvas{width:100%;height:180px;margin-top:5px;}
#chat,#mediaOutput{border:1px solid cyan;padding:5px;height:140px;overflow:auto;}
video,audio,img{max-width:100%;display:block;margin-top:5px;}
footer{text-align:center;font-size:11px;color:#0ff;padding:5px;}
</style>
</head>
<body>
<header>⚛ quantum ai dashboard SUPER FINAL</header>
<div class="container">

<!-- Symbol selector -->
<select id="symbol">
<option>BTCUSDT</option>
<option>ETHUSDT</option>
<option>BNBUSDT</option>
<option>SOLUSDT</option>
</select>

<!-- Chart -->
<canvas id="chart"></canvas>

<!-- AI Chat -->
<input id="q" placeholder="Tanya AI teman curhat">
<button onclick="ask()">Tanya AI</button>

<!-- Media -->
<textarea id="img_prompt" placeholder="Buat gambar / visio"></textarea>
<button onclick="createImage()">Generate Gambar</button>
<textarea id="music_prompt" placeholder="Buat musik"></textarea>
<button onclick="createMusic()">Generate Musik</button>

<div id="chat"></div>
<div id="mediaOutput"></div>
</div>
<footer>by quantum drukanda</footer>

<script>
// ======================
// API KEY ONLINE
// ======================
const API_KEY = "  AIzaSyBBqz083U14kYdKeE8I6pWwyCBmAVTis_k"

// ======================
// Cache & Data
// ======================
let chart, marketData=[], chatCache=[], mediaCache={}
const mediaOutput=document.getElementById("mediaOutput")

// ======================
// Chart Auto-Load
// ======================
async function loadChart(){
  try{
    let symbol=document.getElementById("symbol").value
    let url=`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=50`
    let res=await fetch(url,{headers:{'X-API-KEY':API_KEY}})
    let data=await res.json()
    marketData=data
    localStorage.setItem('chartCache',JSON.stringify(data))
  }catch(err){
    console.log("offline mode")
    let cached=localStorage.getItem('chartCache')
    marketData=cached?JSON.parse(cached):[{"time":"12:00","price":10000}]
  }
  let labels=[],prices=[]
  marketData.forEach(c=>{labels.push(new Date(c[0]).toLocaleTimeString());prices.push(parseFloat(c[4]||c.price))})
  let ctx=document.getElementById("chart").getContext("2d")
  if(chart) chart.destroy()
  chart=new Chart(ctx,{type:"line",data:{labels:labels,datasets:[{label:"price",data:prices,borderColor:"cyan"}]}})
}
loadChart() // auto load saat halaman dibuka

// ======================
// AI Chat Offline Mini
// ======================
function ask(){
  let q=document.getElementById("q").value
  let box=document.getElementById("chat")
  box.innerHTML+="<div>👤 "+q+"</div>"
  let reply="🤖 AI setia mendengar..."
  if(q.toLowerCase().includes("halo")) reply="🤖 Halo bro! Kabar baik kan?"
  else if(q.toLowerCase().includes("sedih")) reply="🤖 Tetap semangat bro, semua ada jalan keluar 🌟"
  else if(chatCache.length>0) reply="🤖 "+chatCache[chatCache.length-1]
  chatCache.push(reply)
  localStorage.setItem('chatCache',JSON.stringify(chatCache))
  box.innerHTML+="<div>"+reply+"</div>"
  box.scrollTop=box.scrollHeight
}

// ======================
// Media Mini Offline
// ======================
function createImage(){
  let prompt=document.getElementById("img_prompt").value
  mediaOutput.innerHTML=""
  let img=new Image()
  img.src="https://via.placeholder.com/300x150?text="+encodeURIComponent(prompt)
  mediaOutput.appendChild(img)
  mediaCache['img']=img.src
  localStorage.setItem('mediaCache',JSON.stringify(mediaCache))
}

function createMusic(){
  let prompt=document.getElementById("music_prompt").value
  mediaOutput.innerHTML=""
  let a=document.createElement("audio")
  a.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
  a.controls=true
  mediaOutput.appendChild(a)
  mediaCache['audio']=a.src
  localStorage.setItem('mediaCache',JSON.stringify(mediaCache))
}
</script>
</body>
</html>
