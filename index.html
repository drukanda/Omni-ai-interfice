<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quantum AI Mobile</title>

<style>

body{
background:black;
color:#00ffff;
font-family:Arial;
text-align:center;
}

h1{
text-shadow:0 0 10px cyan;
}

#chat{
width:95%;
height:300px;
background:#111;
border:1px solid cyan;
margin:auto;
overflow:auto;
padding:10px;
}

input{
width:60%;
padding:10px;
background:black;
color:cyan;
border:1px solid cyan;
}

button{
padding:10px;
background:cyan;
border:none;
margin:5px;
}

img{
max-width:90%;
margin-top:10px;
}

</style>
</head>

<body>

<h1>⚛ Quantum AI Assistant</h1>

<div id="chat"></div>

<br>

<input id="text" placeholder="Tanya sesuatu...">
<button onclick="send()">Kirim</button>

<br><br>

<input type="file" id="imageUpload" accept="image/*">

<br><br>

<input type="file" id="videoUpload" accept="video/*">

<script>

const API_KEY = "MASUKKAN_API_KEY_DISINI"

async function send(){

let text=document.getElementById("text").value
let chat=document.getElementById("chat")

chat.innerHTML += "<p>👤 "+text+"</p>"

let response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{ text:text }
]
}
]
})
}
)

let data = await response.json()

let jawab = data.candidates?.[0]?.content?.parts?.[0]?.text || "AI tidak menjawab"

chat.innerHTML += "<p>🤖 "+jawab+"</p>"

document.getElementById("text").value=""

}

document.getElementById("imageUpload").onchange=function(e){

let file=e.target.files[0]

let url=URL.createObjectURL(file)

let chat=document.getElementById("chat")

chat.innerHTML += "<p>🖼 Gambar diterima AI.</p>"
chat.innerHTML += "<img src='"+url+"'>"

}

document.getElementById("videoUpload").onchange=function(e){

let chat=document.getElementById("chat")

chat.innerHTML += "<p>🎬 Video diterima AI.</p>"

}

</script>

</body>
</html>
