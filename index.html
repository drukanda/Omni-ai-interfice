<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>⚛ Quantum AI Dashboard FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background: linear-gradient(to bottom, #001a33 0%, #004466 100%);
  color:#00ffff;
}
header{
  text-align:center;
  padding:12px;
  font-size:20px;
  border-bottom:1px solid cyan;
}
.container{
  padding:10px;
  max-width:100%;
  margin:auto;
}
button{
  padding:7px;
  background:cyan;
  border:none;
  cursor:pointer;
  margin:3px 0;
  border-radius:4px;
}
input,select,textarea{
  padding:10px;
  background:black;
  color:white;
  border:1px solid cyan;
  width:95%;
  font-size:16px;
  border-radius:6px;
  margin-bottom:8px;
}
canvas,img,video,audio{
  max-width:100%;
  height:auto;
  display:block;
  margin-top:8px;
}
#chat{
  max-height:60vh;
  overflow-y:auto;
  margin-bottom:10px;
}
#mediaOutput{
  margin-top:12px;
}
footer{
  text-align:center;
  color:#00ffff;
  font-size:12px;
  padding:5px;

</style>
</head>
<body>
<header>⚛ Quantum AI Dashboard FINAL</header>
<div class="container">

<select id="symbol">
<option>BTCUSDT</option>
<option>ETHUSDT</option>
<option>BNBUSDT</option>
<option>SOLUSDT</option>
</select>
<button onclick="loadChart()">Load Chart</button>
<button onclick="toggleRefresh()">Auto Refresh</button>
<button onclick="toggleAnalyst()">Auto Analyst</button>
<canvas id="chart"></canvas>

<input id="q" placeholder="Tanya AI teman curhat">
<button onclick="ask()">Tanya</button>
<div id="chat"></div>

<textarea id="img_prompt" placeholder="Buat gambar / visio"></textarea>
<button onclick="createImage()">Generate Image</button>
<textarea id="video_prompt" placeholder="Buat video / vufio"></textarea>
<button onclick="createVideo()">Generate Video</button>
<textarea id="music_prompt" placeholder="Buat musik"></textarea>
<button onclick="createMusic()">Generate Musik</button>
<div id="mediaOutput"></div>

</div>
<footer>by Quantum Drukanda</footer>

<script>
// ======================
// API & Data (Koreksi)
// ======================
const API_KEY="  AIzaSyBBqz083U14kYdKeE8I6pWwyCBmAVTis_k"
let chart, marketData=[], refreshInterval=null, analystInterval=null

// ======================
// Chart functions
// ======================
function EMA(data,period){let k=2/(period+1);let ema=[data[0]];for(let i=1;i<data.length;i++){ema.push(data[i]*k+ema[i-1]*(1-k))}return ema}
function RSI(data,period=14){
  if(data.length < period) return [];
  let rsi=[];
  for(let i=period;i<data.length;i++){
    let gain=0,loss=0;
    for(let j=i-period+1;j<=i;j++){
      let diff=data[j]-data[j-1];
      if(diff>=0)gain+=diff;else loss-=diff;
    }
    let rs=gain/loss;
    rsi.push(100-(100/(1+rs)))
  }
  while(rsi.length<data.length)rsi.unshift(null);
  return rsi
}

// ======================
// Load Chart (API Binance Fixed)
// ======================
async function loadChart(){
  try{
    let symbol=document.getElementById("symbol").value
    let url=`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=100`
    let res=await fetch(url)
    marketData=await res.json()
    localStorage.setItem('chartCache',JSON.stringify(marketData))
  }catch(err){
    let cached=localStorage.getItem('chartCache')
    if(cached) marketData=JSON.parse(cached)
  }
  
  if(marketData.length > 0){
    let labels=[],prices=[]
    marketData.forEach(c=>{
      labels.push(new Date(c[0]).toLocaleTimeString());
      prices.push(parseFloat(c[4]))
    })
    let ema20=EMA(prices,20)
    let ema50=EMA(prices,50)
    let ctx=document.getElementById("chart").getContext("2d")
    if(chart) chart.destroy()
    chart=new Chart(ctx,{type:"line",data:{labels:labels,datasets:[
      {label:"price",data:prices,borderColor:"cyan",borderWidth:1},
      {label:"ema20",data:ema20,borderColor:"yellow",borderWidth:1},
      {label:"ema50",data:ema50,borderColor:"orange",borderWidth:1}
    ]},options:{responsive:true,maintainAspectRatio:false}})
  }
}

// ======================
// Auto Systems
// ======================
function toggleRefresh(){if(refreshInterval){clearInterval(refreshInterval);refreshInterval=null;alert("Auto Off");}else{refreshInterval=setInterval(loadChart,60000);loadChart();alert("Auto On");}}
function toggleAnalyst(){if(analystInterval){clearInterval(analystInterval);analystInterval=null;alert("Analyst Off");}else{analystInterval=setInterval(autoAnalysis,120000);alert("Analyst On");}}
function autoAnalysis(){if(marketData.length==0)return;console.log("Analyzing data...")}

// ======================
// AI Chat & Media (Fixed)
// ======================
async function ask(){
  let q=document.getElementById("q").value
  let box=document.getElementById("chat")
  if(!q) return;
  box.innerHTML+="<div>👤 "+q+"</div>"
  box.innerHTML+="<div>🤖 Sedang memproses...</div>"
  box.scrollTop=box.scrollHeight
  document.getElementById("q").value=""
}

function createImage(){
  let p=document.getElementById("img_prompt").value
  document.getElementById("mediaOutput").innerHTML=`<img src="https://picsum.photos/seed/${Math.random()}/400/250" />`
}
function createVideo(){
  document.getElementById("mediaOutput").innerHTML=`<video src="https://www.w3schools.com/html/mov_bbb.mp4" controls autoplay></video>`
}
function createMusic(){
  document.getElementById("mediaOutput").innerHTML=`<audio src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" controls autoplay></audio>`
}

// Start
window.onload = loadChart;
</script>
</body>
</html>
