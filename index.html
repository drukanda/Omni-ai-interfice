<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>quantum ai dashboard SUPER PRO FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  font-family:Arial;
  overflow:hidden;
}
body{
  display:flex;
  flex-direction:column;
  background: radial-gradient(circle at 30% 30%, #002244, #000011 80%);
  color:#0ff;
}
header{
  text-align:center;
  padding:8px;
  font-size:18px;
  border-bottom:1px solid cyan;
  z-index:2;
}
.container{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}
#chartContainer{
  flex:0 0 200px;
  padding:5px;
}
canvas{
  width:100%;
  height:100%;
}
#chatContainer{
  flex:1;
  overflow-y:auto;
  padding:5px;
}
#mediaOutput{
  padding:5px;
}
#inputContainer{
  padding:5px;
  background:rgba(0,0,50,0.5);
  display:flex;
  flex-direction:column;
}
textarea{
  width:100%;
  min-height:40px;
  max-height:120px;
  resize:none;
  padding:6px;
  border:1px solid cyan;
  border-radius:6px;
  background:rgba(0,0,50,0.5);
  color:#0ff;
}
button{
  margin-top:4px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:cyan;
  color:black;
  cursor:pointer;
}
footer{
  text-align:center;
  font-size:11px;
  padding:4px;
  color:#0ff;
}
.media{
  margin-top:5px;
  max-width:100%;
}
</style>
</head>
<body>

<header>⚛ quantum ai dashboard SUPER PRO FINAL</header>

<div class="container">

  <!-- Chart -->
  <div id="chartContainer">
    <select id="symbol">
      <option>BTCUSDT</option>
      <option>ETHUSDT</option>
      <option>BNBUSDT</option>
      <option>SOLUSDT</option>
    </select>
    <canvas id="chart"></canvas>
  </div>

  <!-- Chat + Media -->
  <div id="chatContainer"></div>
  <div id="mediaOutput"></div>

  <!-- Kotak Input Paling Bawah -->
  <div id="inputContainer">
    <textarea id="q" placeholder="Tanya AI… Enter → submit" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ask();}"></textarea>
    <button onclick="ask()">↟ Kirim</button>
  </div>

</div>

<footer>by quantum drukanda</footer>

<script>
// ======================
// API KEY ONLINE
// ======================
const API_KEY="  AIzaSyBBqz083U14kYdKeE8I6pWwyCBmAVTis_k"

// ======================
// Chart
// ======================
let chart, marketData=[]
const chatContainer=document.getElementById("chatContainer")
const mediaOutput=document.getElementById("mediaOutput")

async function loadChart(){
  try{
    let symbol=document.getElementById("symbol").value
    let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=50`)
    let data=await res.json()
    marketData=data
  }catch(err){
    console.log("offline mode, data kosong")
    marketData=[{"time":0,"price":0}]
  }
  let labels=[],prices=[]
  marketData.forEach(c=>{
    labels.push(new Date(c[0]).toLocaleTimeString())
    prices.push(parseFloat(c[4]||c.price))
  })
  let ctx=document.getElementById("chart").getContext("2d")
  if(chart) chart.destroy()
  chart=new Chart(ctx,{type:"line",data:{labels:labels,datasets:[{label:"price",data:prices,borderColor:"cyan"}]}})
}
loadChart()

// ======================
// AI Jawaban
// ======================
async function ask(){
  let q=document.getElementById("q").value
  if(!q.trim()) return
  chatContainer.innerHTML+='<div>👤 '+q+'</div>'
  let reply="🤖 Sedang mengambil jawaban..."
  chatContainer.innerHTML+='<div>'+reply+'</div>'
  chatContainer.scrollTop=chatContainer.scrollHeight
  document.getElementById("q").value=""

  // Contoh fetch AI pro
  try{
    // Ganti endpoint API bro sendiri
    let res=await fetch(`https://api.example.com/ai?key=${API_KEY}&prompt=${encodeURIComponent(q)}`)
    let data=await res.json()
    reply=data.answer||"🤖 AI belum ada jawaban"
  }catch(err){
    // fallback cerdas offline
    reply="🤖 Bro, AI siap bantu menjawab: "+q
  }
  chatContainer.innerHTML+='<div>'+reply+'</div>'
  chatContainer.scrollTop=chatContainer.scrollHeight

  // Media otomatis jika keyword
  if(q.toLowerCase().includes("gambar")) createImage(q)
  if(q.toLowerCase().includes("musik")) createMusic(q)
  if(q.toLowerCase().includes("video")||q.toLowerCase().includes("vufio")) createVideo(q)
}

// ======================
// Media
// ======================
function createImage(prompt){
  mediaOutput.innerHTML=""
  let img=new Image()
  img.src="https://via.placeholder.com/300x150?text="+encodeURIComponent(prompt)
  img.className="media"
  mediaOutput.appendChild(img)
}
function createMusic(prompt){
  mediaOutput.innerHTML=""
  let a=document.createElement("audio")
  a.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
  a.controls=true
  a.className="media"
  mediaOutput.appendChild(a)
}
function createVideo(prompt){
  mediaOutput.innerHTML=""
  let v=document.createElement("video")
  v.src="https://via.placeholder.com/300x150?text="+encodeURIComponent(prompt)
  v.controls=true
  v.className="media"
  mediaOutput.appendChild(v)
}
</script>

</body>
</html>
