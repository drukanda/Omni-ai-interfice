<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00f3ff; font-family: monospace; }
        .terminal-box { border: 1px solid #083344; background: rgba(0,0,0,0.9); height: 60vh; }
        .btn-ui { border: 1px solid #22d3ee; font-size: 10px; padding: 8px; border-radius: 4px; }
        ::-webkit-scrollbar { width: 2px; }
    </style>
</head>
<body class="p-4 flex flex-col h-screen">

    <div class="flex justify-between items-center mb-4 border-b border-cyan-900 pb-2">
        <h1 class="text-xs font-bold italic">DRUKANDA <span class="text-white">OMNI-AI</span></h1>
        <div class="flex gap-1 h-3">
            <div class="w-1 bg-cyan-500 animate-pulse"></div>
            <div class="w-1 bg-cyan-400 animate-pulse" style="animation-delay: 0.2s"></div>
        </div>
    </div>

    <div id="display" class="terminal-box rounded-lg p-3 overflow-y-auto text-[11px] mb-4 space-y-3">
        <div class="text-cyan-900 italic">[SYSTEM]: Link Established. Jalur v1/v1beta Sinkron.</div>
    </div>

    <div class="mt-auto space-y-3">
        <textarea id="prompt" placeholder="Ketik perintah..." 
                  class="w-full bg-black border border-cyan-900 p-2 rounded text-white text-xs h-20 outline-none focus:border-cyan-400"></textarea>
        
        <div class="grid grid-cols-3 gap-2">
            <button onclick="askAI()" class="btn-ui bg-cyan-950/20 text-cyan-400 font-bold uppercase">💡 Tanya</button>
            <button class="btn-ui opacity-20 text-gray-500 uppercase">🎨 Gambar</button>
            <button class="btn-ui opacity-20 text-gray-500 uppercase">🎬 Video</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyA28Oxr6apgNTzdVkJ34xvEmrsPv5fNGhw";

        async function askAI() {
            const input = document.getElementById('prompt');
            const box = document.getElementById('display');
            const val = input.value;
            if(!val) return;

            box.innerHTML += `<div class="text-gray-500">> ${val}</div>`;
            const msg = document.createElement('div');
            msg.className = "text-cyan-400 border-l border-cyan-700 pl-2 my-2";
            msg.innerText = "Connecting...";
            box.appendChild(msg);
            input.value = "";
            box.scrollTop = box.scrollHeight;

            // DAFTAR MODEL UNTUK DICOBA SATU PER SATU JIKA ERROR
            const models = [
                "v1beta/models/gemini-1.5-flash",
                "v1/models/gemini-pro"
            ];

            for (let path of models) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/${path}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                    });
                    const data = await res.json();
                    
                    if (data.candidates && data.candidates[0].content) {
                        msg.innerHTML = `<strong>AI:</strong> ${data.candidates[0].content.parts[0].text}`;
                        box.scrollTop = box.scrollHeight;
                        return; // BERHENTI JIKA BERHASIL
                    }
                } catch (e) {
                    continue; // COBA MODEL BERIKUTNYA
                }
            }
            msg.innerHTML = `<span class="text-red-600 text-[10px]">SEMUA JALUR GAGAL. Periksa kuota atau izin API Key di Google AI Studio.</span>`;
        }
    </script>
</body>
</html>
