    <script>
        async function sh(e) {
            if (e.key === 'Enter' && e.target.value) {
                const p = e.target.value;
                const c = document.getElementById('chat');
                c.innerHTML += `<div class="u">User: ${p}</div>`;
                e.target.value = '';
                
                try {
                    const res = await fetch('/api', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ pesan: p }) // Mengirim 'pesan'
                    });
                    const d = await res.json();
                    // MEMBACA 'jawaban'
                    c.innerHTML += `<div class="a">AI: ${d.jawaban || "Gagal baca jawaban"}</div>`;
                } catch (err) {
                    c.innerHTML += `<div class="a">AI: Error Koneksi</div>`;
                }
                c.scrollTop = c.scrollHeight;
            }
        }
    </script>
