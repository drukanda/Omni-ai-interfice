<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>⚛ Quantum Drukanda OS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* KEMBALI KE BASE ASLI BRO AGAR TIDAK RUSAK */
body{
  margin:0; font-family:Arial, sans-serif;
  background: #001a33; color:#00ffff;
  display: flex; flex-direction: column; height: 100vh;
}
header{ text-align:center; padding:10px; border-bottom:1px solid cyan; font-size:18px; flex-shrink: 0; }

/* AREA CHAT DENGAN AUTO-SCROLL */
#scrollArea{
  flex: 1; overflow-y: auto; padding: 15px;
  display: flex; flex-direction: column;
}

/* FONT SIZE SESUAI REQUEST (14/16px) */
.user-log { font-size: 14px; color: #0ff; margin-top: 15px; border-left: 2px solid cyan; padding-left: 10px; }
.sys-log { font-size: 14px; color: yellow; margin-bottom: 5px; }
.ai-msg { font-size: 16px; color: #fff; line-height: 1.5; margin-bottom: 12px; }

canvas, img, video, audio {
  max-width:100%; border-radius: 8px; border: 1px solid cyan; margin-top: 10px; flex-shrink: 0;
}

/* INPUT AREA DI BAWAH (STABIL) */
.input-area {
  padding: 10px; background: rgba(0,0,0,0.8); border-top: 1px solid cyan; flex-shrink: 0;
}
input, select {
  padding:12px; background:#000; color:#fff; border:1px solid cyan;
  width:100%; font-size:16px; border-radius:5px; margin-bottom:5px; box-sizing: border-box;
}
button {
  padding:12px; background:cyan; border:none; border-radius:5px;
  font-weight:bold; color:#000; cursor:pointer; width: 100%; font-size: 16px; margin-bottom: 5px;
}
footer { text-align:center; font-size:10px; padding:5px; opacity: 0.5; }
</style>
</head>
<body>

<header>⚛ QUANTUM DRUKANDA OS</header>

<div id="scrollArea">
  <div style="height: 180px; min-height: 180px; flex-shrink: 0;"><canvas id="chart"></canvas></div>
  <div id="chat"></div>
</div>

<div class="input-area">
  <select id="symbol">
    <option>BTCUSDT</option><option>ETHUSDT</option>
  </select>
  <button onclick="loadChart()">⚡ SYNC MARKET MATRIX</button>
  
  <input id="q" placeholder="Ketik perintah (Vidio, Poto, dll)..." onkeydown="if(event.key==='Enter') ask()">
  <button onclick="ask()" style="background:#0ff">⚡ EXECUTE QUANTUM</button>
</div>

<footer>© 2026 Dadan Sukaryat Putra</footer>

<script>
// --- KONFIGURASI API TOKEN ---
const API_KEY = "AIzaSyBBqz083U14kYdKeE8I6pWwyCBmAVTis_k"; 
let chart, marketData = [];

// --- FUNGSI CHART STABIL ---
async function loadChart(){
  try {
    let sym = document.getElementById("symbol").value;
    let url = `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=1h&limit=50`;
    let res = await fetch(url, { headers: { 'X-MBX-APIKEY': API_KEY } });
    marketData = await res.json();
  } catch(e) { console.log("Koneksi API Gagal"); }
  
  if(marketData.length > 0) {
    let prices = marketData.map(c => parseFloat(c[4]));
    let labels = marketData.map(c => new Date(c[0]).toLocaleTimeString());
    let ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{ label: 'Price', data: prices, borderColor: 'cyan', borderWidth: 2, pointRadius: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }
}

// --- FUNGSI AI NYAMBUNG & AUTO-SCROLL ---
async function ask() {
  const input = document.getElementById("q");
  const box = document.getElementById("chat");
  const scrollArea = document.getElementById("scrollArea");
  const q = input.value.trim();
  if(!q) return;

  // Log User (14px)
  box.innerHTML += `<div class="user-log">> Executing: ${q}</div>`;
  const id = "sys-" + Date.now();
  box.innerHTML += `<div id="${id}" class="sys-log">[SYS]: ANALYZING...</div>`;
  
  input.value = "";
  // Geser layar ke bawah agar log terlihat
  scrollArea.scrollTop = scrollArea.scrollHeight;

  setTimeout(() => {
    let low = q.toLowerCase();
    let sysLog = document.getElementById(id);
    
    // LOGIKA HARUS NYAMBUNG
    if (low.includes("video") || low.includes("vidio")) {
      sysLog.innerHTML = "🤖 Quantum: VIDEO STREAM SYNCED.";
      box.innerHTML += `<video src="https://www.w3schools.com/html/mov_bbb.mp4" controls autoplay></video>`;
    } else if (low.includes("gambar") || low.includes("poto") || low.includes("foto")) {
      sysLog.innerHTML = "🤖 Quantum: VISUALIZATION COMPLETE.";
      box.innerHTML += `<img src="https://picsum.photos/seed/${Math.random()}/400/250" />`;
    } else {
      sysLog.innerHTML = "🤖 Quantum: ANALYSIS COMPLETE.";
      box.innerHTML += `<div class="ai-msg">Output: Kausalitas untuk "${q}" telah diproses.</div>`;
    }

    // AUTO-SCROLL KE BAWAH SETELAH JAWABAN MUNCUL
    setTimeout(() => {
      scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
    }, 100);
  }, 500);
}

window.onload = loadChart;
</script>
</body>
</html>
