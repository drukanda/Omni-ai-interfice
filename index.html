<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>⚛ Quantum Drukanda OS v800</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
  margin:0; font-family:'Courier New', monospace;
  background: #000; color:#00ffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
header{ text-align:center; padding:10px; border-bottom:1px solid cyan; font-size:18px; text-shadow: 0 0 8px cyan; }

/* MONITOR AREA (AUTO-SCROLL KE BAWAH) */
#scrollArea{
  flex: 1; overflow-y: auto; padding: 15px;
  display: flex; flex-direction: column; scroll-behavior: smooth;
}

/* FONT STANDAR 14/16px SESUAI REQUEST */
.log-user { font-size: 14px; color: #0ff; margin-top: 15px; border-left: 3px solid cyan; padding-left: 10px; opacity: 0.8; }
.log-sys { font-size: 14px; color: yellow; margin-bottom: 5px; font-weight: bold; }
.ai-msg { font-size: 16px; color: #fff; line-height: 1.5; margin-bottom: 15px; padding: 10px; background: rgba(0,255,255,0.05); border-radius: 5px; }

canvas, img, video, audio {
  max-width:100%; border-radius: 8px; border: 1px solid cyan; margin: 10px 0; box-shadow: 0 0 10px rgba(0,255,255,0.3);
}

/* INPUT TERMINAL DI BAWAH */
.input-area {
  padding: 15px; background: #000; border-top: 1px solid cyan; flex-shrink: 0;
}
input, select {
  padding:12px; background:#000; color:#fff; border:1px solid cyan;
  width:100%; font-size:16px; border-radius:5px; margin-bottom:8px; box-sizing: border-box; outline: none;
}
button {
  padding:12px; background:cyan; border:none; border-radius:5px;
  font-weight:bold; color:#000; cursor:pointer; width: 100%; font-size: 16px;
}
footer { text-align:center; font-size:10px; padding:5px; color: cyan; opacity: 0.5; }
</style>
</head>
<body>

<header>⚛ QUANTUM DRUKANDA - ABSOLUTE CAUSALITY</header>

<div id="scrollArea">
  <div style="height: 180px; flex-shrink: 0;"><canvas id="chart"></canvas></div>
  <div id="chat"></div>
</div>

<div class="input-area">
  <select id="symbol">
    <option>BTCUSDT</option><option>ETHUSDT</option><option>BNBUSDT</option>
  </select>
  <button onclick="loadChart()">⚡ SYNC MARKET MATRIX</button>
  
  <input id="q" placeholder="Command: Vidio, Poto, atau Analisis..." onkeydown="if(event.key==='Enter') ask()">
  <button onclick="ask()" style="background:#0ff">⚡ EXECUTE QUANTUM</button>
</div>

<footer>© 2026 Dadan Sukaryat Putra (Drukanda) - Quantum Singularity</footer>

<script>
// ==========================================
// 1. SLOT TOKEN (LOCKED & VALID)
// ==========================================
const API_KEY = " AIzaSyBBqz083U14kYdKeE8I6pWwyCBmAVTis_k "; 

let chart, marketData = [];

// --- API CHART (STABIL) ---
async function loadChart(){
  try {
    let sym = document.getElementById("symbol").value;
    let url = `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=1h&limit=50`;
    let res = await fetch(url, { headers: { 'X-MBX-APIKEY': API_KEY } });
    marketData = await res.json();
    localStorage.setItem('chartCache', JSON.stringify(marketData));
  } catch(e) { 
    let cached = localStorage.getItem('chartCache');
    if(cached) marketData = JSON.parse(cached);
  }
  
  if(marketData.length > 0) {
    let prices = marketData.map(c => parseFloat(c[4]));
    let labels = marketData.map(c => new Date(c[0]).toLocaleTimeString());
    let ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{ label: 'Price', data: prices, borderColor: 'cyan', borderWidth: 2, pointRadius: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }
}

// ==========================================
// 2. LOGIKA QUANTUM GAHAR (INTENT MAPPING)
// ==========================================
async function ask() {
  const input = document.getElementById("q");
  const box = document.getElementById("chat");
  const scrollArea = document.getElementById("scrollArea");
  const q = input.value.trim();
  if(!q) return;

  // Log Input User
  box.innerHTML += `<div class="log-user">> Command: ${q}</div>`;
  const id = "sys-" + Date.now();
  box.innerHTML += `<div id="${id}" class="log-sys">[SYS]: QUANTUM PROBABILITY SCANNING...</div>`;
  
  input.value = "";
  scrollArea.scrollTop = scrollArea.scrollHeight;

  // PROSES LOGIKA SANGAT CERDAS
  setTimeout(() => {
    let low = q.toLowerCase();
    let sysLog = document.getElementById(id);
    let outputHtml = "";

    // Mapping Kausalitas Berdasarkan Keyword Dominan
    const check = (keys) => keys.some(k => low.includes(k));

    if (check(['video', 'vidio', 'vufio', 'vidio'])) {
      sysLog.innerHTML = "🤖 Quantum: SINKRONISASI VIDEO BERHASIL.";
      outputHtml = `<div class="ai-msg">Output: Menampilkan Video berdasarkan perintah "${q}".</div>
                    <video src="https://www.w3schools.com/html/mov_bbb.mp4" controls autoplay></video>`;
    } 
    else if (check(['gambar', 'poto', 'foto', 'image'])) {
      sysLog.innerHTML = "🤖 Quantum: VISUALISASI MATRIX SELESAI.";
      outputHtml = `<div class="ai-msg">Output: Gambar hasil observasi "${q}" telah dihasilkan.</div>
                    <img src="https://picsum.photos/seed/${Math.random()}/400/250" />`;
    } 
    else if (check(['musik', 'suara', 'voice', 'lagu'])) {
      sysLog.innerHTML = "🤖 Quantum: FREKUENSI AUDIO TERDETEKSI.";
      outputHtml = `<audio src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" controls autoplay></audio>`;
    } 
    else if (check(['chart', 'harga', 'market', 'btc'])) {
      sysLog.innerHTML = "🤖 Quantum: UPDATING MARKET GRAPH...";
      loadChart();
      outputHtml = `<div class="ai-msg">Monitor Market telah diperbarui dengan data real-time untuk "${q}".</div>`;
    }
    else {
      sysLog.innerHTML = "🤖 Quantum: ANALISIS DETERMINISTIK SELESAI.";
      outputHtml = `<div class="ai-msg">Respon: "${q}" telah diproses. Sesuai Manifesto Drukanda, setiap aksi memiliki reaksi absolut dalam sistem.</div>`;
    }

    box.innerHTML += outputHtml;

    // AUTO-SCROLL (LAYAR NAIK): Jawaban Selalu Di Depan Mata
    setTimeout(() => {
      scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
    }, 150);
  }, 600);
}

window.onload = loadChart;
</script>
</body>
</html>
