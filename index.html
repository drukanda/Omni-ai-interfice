<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRUKANDA OMNI-AI | ELITE CONSOLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00f3ff; font-family: 'Courier New', monospace; overflow: hidden; }
        .neon-box { border: 1px solid rgba(0, 243, 255, 0.2); box-shadow: 0 0 20px rgba(0, 243, 255, 0.05); }
        .chart-up { height: 100%; background: #00f3ff; transition: height 0.3s ease; width: 10px; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #00f3ff; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-6xl h-[90vh] flex flex-col md:flex-row gap-4">
        
        <div class="w-full md:w-1/4 neon-box p-4 rounded-xl flex flex-col justify-between bg-black/40">
            <div>
                <h2 class="text-xs font-bold mb-4 tracking-widest text-white italic">QUANTUM STATUS</h2>
                <div class="flex items-end justify-between h-32 gap-1 mb-4 border-b border-cyan-900 pb-2">
                    <div id="c1" class="chart-up" style="height: 40%"></div>
                    <div id="c2" class="chart-up" style="height: 70%"></div>
                    <div id="c3" class="chart-up" style="height: 50%"></div>
                    <div id="c4" class="chart-up" style="height: 90%"></div>
                    <div id="c5" class="chart-up" style="height: 30%"></div>
                </div>
                <p class="text-[9px] text-cyan-500">CORE LOAD: <span id="load-val">45%</span></p>
            </div>
            <div class="space-y-2">
                <div class="text-[9px] p-2 bg-cyan-950/30 rounded border border-cyan-800">
                    <span class="text-white">API LINK:</span> <span class="text-green-500 font-bold">STABLE</span>
                </div>
                <div class="text-[9px] p-2 bg-cyan-950/30 rounded border border-cyan-800">
                    <span class="text-white">ENCRYPTION:</span> <span class="text-cyan-400 font-bold">AES-256</span>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col gap-4">
            <div id="display" class="flex-1 neon-box bg-black/80 rounded-xl p-6 overflow-y-auto space-y-4 text-sm">
                <div class="text-cyan-700 italic font-bold text-xs animate-pulse">[READY]: DRUKANDA OMNI-AI ONLINE. SILAKAN EKSEKUSI...</div>
            </div>

            <div class="neon-box p-4 rounded-xl bg-black/60 space-y-4">
                <textarea id="prompt" placeholder="Ketik perintah kreatif di sini..." 
                          class="w-full bg-black/80 border border-cyan-900 p-3 rounded text-white focus:outline-none focus:border-cyan-400 h-20 text-xs"></textarea>
                
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="runAI('tanya')" class="p-3 bg-cyan-500/10 border border-cyan-500 text-[10px] font-bold hover:bg-cyan-500 hover:text-black transition uppercase">💡 Tanya AI</button>
                    <button onclick="runAI('gambar')" class="p-3 bg-purple-500/10 border border-purple-500 text-[10px] font-bold hover:bg-purple-500 hover:text-white transition uppercase text-purple-400">🎨 Gambar</button>
                    <button onclick="runAI('video')" class="p-3 bg-blue-500/10 border border-blue-500 text-[10px] font-bold hover:bg-blue-500 hover:text-white transition uppercase text-blue-400">🎬 Video</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyA28Oxr6apgNTzdVkJ34xvEmrsPv5fNGhw";

        // Animasi Chart agar Dinamis
        setInterval(() => {
            for(let i=1; i<=5; i++){
                document.getElementById('c'+i).style.height = (Math.random() * 80 + 20) + "%";
            }
            document.getElementById('load-val').innerText = Math.floor(Math.random() * 30 + 10) + "%";
        }, 2000);

        async function runAI(mode) {
            const promptInput = document.getElementById('prompt');
            const display = document.getElementById('display');
            const text = promptInput.value;
            if (!text) return;

            display.innerHTML += `<div class="text-white opacity-50 font-bold">> USER: ${text}</div>`;
            const aiMsg = document.createElement('div');
            aiMsg.className = "text-cyan-400 p-3 bg-cyan-900/10 border-l border-cyan-400";
            aiMsg.innerHTML = `<span class="glitch italic">Establishing Quantum Bridge...</span>`;
            display.appendChild(aiMsg);
            promptInput.value = "";
            display.scrollTop = display.scrollHeight;

            try {
                if (mode === 'tanya') {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    aiMsg.innerHTML = `<strong>[OMNI-AI]:</strong> ${data.candidates[0].content.parts[0].text}`;
                } else {
                    aiMsg.innerHTML = `<div class="text-xs text-yellow-500 italic">[SIMULASI ${mode.toUpperCase()}]: Sedang merender objek "${text}". Tunggu pembaruan modul berikutnya.</div>`;
                }
            } catch (err) {
                aiMsg.innerHTML = `<div class="bg-red-950/40 p-3 border border-red-600 text-red-500 text-[10px]"><strong>SYSTEM CRASH:</strong> ${err.message}</div>`;
            }
            display.scrollTop = display.scrollHeight;
        }
    </script>
</body>
</html>
