<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRUKANDA OMNI-AI | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #020617 0%, #0f172a 100%); min-height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ai-card { border-left: 4px solid #22d3ee; background: rgba(34, 211, 238, 0.05); }
        .user-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center h-screen">

    <div class="w-full max-w-md text-center py-4">
        <h1 class="text-2xl font-black tracking-widest text-cyan-400">DRUKANDA <span class="text-white opacity-80">OMNI</span></h1>
        <div class="flex justify-center gap-1 mt-1">
            <div class="h-1 w-8 bg-cyan-500 rounded-full animate-pulse"></div>
            <div class="h-1 w-2 bg-cyan-500 rounded-full"></div>
        </div>
    </div>

    <div id="display" class="w-full max-w-md glass rounded-3xl flex-1 overflow-y-auto p-5 mb-4 shadow-2xl flex flex-col gap-4">
        <div class="text-[10px] text-cyan-500 text-center tracking-[0.3em] uppercase opacity-50">Neural Link v4.0 Active</div>
    </div>

    <div class="w-full max-w-md pb-4 space-y-3">
        <div class="relative">
            <textarea id="prompt" placeholder="Tuliskan perintah..." 
                      class="w-full glass rounded-2xl p-4 text-sm text-white focus:outline-none focus:ring-1 focus:ring-cyan-500 h-20 resize-none shadow-inner bg-black/20"></textarea>
        </div>
        
        <button onclick="askAI()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm flex items-center justify-center gap-2">
            <span>🚀 JALANKAN PERINTAH</span>
        </button>
    </div>

    <script>
        // KUNCI BARU KAMU SUDAH TERPASANG
        const API_KEY = "AIzaSyBKWKwW6YUNppdGNfY_unMl_1SmvrEDwWk";

        async function askAI() {
            const input = document.getElementById('prompt');
            const box = document.getElementById('display');
            const val = input.value.trim();
            if(!val) return;

            // Render Pesan User
            box.innerHTML += `<div class="user-card p-4 rounded-2xl self-end max-w-[85%] ml-auto text-sm"><b>USER:</b> ${val}</div>`;
            
            const msg = document.createElement('div');
            msg.className = "ai-card p-4 rounded-2xl self-start max-w-[90%] text-sm shadow-md animate-pulse";
            msg.innerHTML = "<b>AI:</b> Mengakses Quantum Core...";
            box.appendChild(msg);
            input.value = "";
            box.scrollTop = box.scrollHeight;

            // List Model untuk Auto-Switch
            const models = ["gemini-1.5-flash", "gemini-1.5-pro"];
            let success = false;

            for (let modelName of models) {
                if (success) break;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                    });
                    
                    const data = await res.json();
                    
                    if (data.candidates && data.candidates[0].content) {
                        msg.classList.remove('animate-pulse');
                        msg.innerHTML = `<b>DRUKANDA AI:</b> ${data.candidates[0].content.parts[0].text}`;
                        success = true;
                    }
                } catch (e) {
                    console.error("Gagal di model " + modelName);
                }
            }

            if (!success) {
                msg.classList.remove('animate-pulse');
                msg.innerHTML = `<div class="text-red-400 font-bold underline">ERROR CRITICAL:</div> Jalur ditolak. Pastikan API Key di Google AI Studio sudah "Active" dan tidak ada batasan region.`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
