<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>quantum ai dashboard SUPER PRO FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(to bottom, #001f3f, #003366, #001f3f);
  color:#0ff;
}
header{
  text-align:center;
  padding:8px;
  font-size:18px;
  border-bottom:1px solid cyan;
}
.container{
  padding:6px;
  max-width:100%;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:5px;
}
canvas{
  width:100%;
  height:180px;
  margin-top:5px;
}
#chatContainer{
  max-height:300px;
  overflow:auto;
}
textarea,input,button,select{
  padding:6px;
  border:1px solid cyan;
  background:rgba(0,0,50,0.5);
  color:#0ff;
  width:100%;
  box-sizing:border-box;
  border-radius:6px;
  resize:none;
}
textarea{
  min-height:40px;
  max-height:120px;
}
button{
  cursor:pointer;
}
footer{
  text-align:center;
  font-size:11px;
  color:#0ff;
  padding:5px;
}
.media{
  margin-top:5px;
  max-width:100%;
}
</style>
</head>
<body>
<header>⚛ quantum ai dashboard SUPER PRO FINAL</header>
<div class="container">

<!-- Chart -->
<select id="symbol">
<option>BTCUSDT</option>
<option>ETHUSDT</option>
<option>BNBUSDT</option>
<option>SOLUSDT</option>
</select>
<canvas id="chart"></canvas>

<!-- Jawaban & Media -->
<div id="chatContainer"></div>
<div id="mediaOutput"></div>

<!-- Kotak Input -->
<textarea id="q" placeholder="Tanya AI… Enter → submit" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ask();}"></textarea>
<button onclick="ask()">↟ Kirim</button>

</div>
<footer>by quantum drukanda</footer>

<script>
// ======================
// API KEY ONLINE
// ======================
const API_KEY="  AIzaSyBBqz083U14kYdKeE8I6pWwyCBmAVTis_k"

// ======================
// Data & Chart
// ======================
let chart, marketData=[]
const chatContainer=document.getElementById("chatContainer")
const mediaOutput=document.getElementById("mediaOutput")

async function loadChart(){
  try{
    let symbol=document.getElementById("symbol").value
    let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=50`,{headers:{'X-API-KEY':API_KEY}})
    let data=await res.json()
    marketData=data
  }catch(err){
    console.log("offline mode, data kosong")
    marketData=[{"time":0,"price":0}]
  }
  let labels=[],prices=[]
  marketData.forEach(c=>{labels.push(new Date(c[0]).toLocaleTimeString());prices.push(parseFloat(c[4]||c.price))})
  let ctx=document.getElementById("chart").getContext("2d")
  if(chart) chart.destroy()
  chart=new Chart(ctx,{type:"line",data:{labels:labels,datasets:[{label:"price",data:prices,borderColor:"cyan"}]}})
}
loadChart()

// ======================
// AI Pro / Jawaban
// ======================
async function ask(){
  let q=document.getElementById("q").value
  if(!q.trim()) return
  chatContainer.innerHTML+='<div>👤 '+q+'</div>'

  // fetch jawaban AI online dari API cerdas
  let reply="🤖 Sedang mengambil jawaban..."
  try{
    // Contoh fetch (bro bisa ganti endpoint / backend sendiri)
    let res=await fetch(`https://api.example.com/ai?key=${API_KEY}&prompt=${encodeURIComponent(q)}`)
    let data=await res.json()
    reply=data.answer||"🤖 AI belum ada jawaban"
  }catch(err){
    reply="🤖 Gagal mengambil jawaban, coba lagi"
  }

  chatContainer.innerHTML+='<div>'+reply+'</div>'
  chatContainer.scrollTop=chatContainer.scrollHeight
  document.getElementById("q").value=""

  // Media otomatis jika keyword ada
  if(q.toLowerCase().includes("gambar")) createImage(q)
  if(q.toLowerCase().includes("musik")) createMusic(q)
  if(q.toLowerCase().includes("video")||q.toLowerCase().includes("vufio")) createVideo(q)
}

// ======================
// Media
// ======================
function createImage(prompt){
  mediaOutput.innerHTML=""
  let img=new Image()
  img.src="https://via.placeholder.com/300x150?text="+encodeURIComponent(prompt)
  img.className="media"
  mediaOutput.appendChild(img)
}
function createMusic(prompt){
  mediaOutput.innerHTML=""
  let a=document.createElement("audio")
  a.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
  a.controls=true
  a.className="media"
  mediaOutput.appendChild(a)
}
function createVideo(prompt){
  mediaOutput.innerHTML=""
  let v=document.createElement("video")
  v.src="https://via.placeholder.com/300x150?text="+encodeURIComponent(prompt)
  v.controls=true
  v.className="media"
  mediaOutput.appendChild(v)
}
</script>
</body>
</html>
